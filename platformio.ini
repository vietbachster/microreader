; PlatformIO project configuration for microreader2 firmware.
; Desktop build lives under platforms/desktop/ (CMake + SDL2).

[platformio]
default_envs = esp32c3
src_dir = platforms/esp32

[env:esp32c3]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = espidf

; --- Flash / upload ---
board_build.partitions    = platforms/esp32/default_16MB.csv
board_build.flash_size    = 16MB
board_build.flash_mode    = dio
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000
upload_speed              = 921600
upload_port               = COM4

; --- Serial monitor ---
monitor_speed  = 115200
monitor_port   = COM4
monitor_rts    = 0
monitor_dtr    = 0
monitor_flags  = --reconnect

; --- Compiler flags ---
build_flags =
    -Ilib
