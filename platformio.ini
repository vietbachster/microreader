; PlatformIO project configuration for microreader2 firmware.
; Replaces the ESP-IDF CMake build (esp32/) for the embedded target.
; Desktop build is unchanged (scripts/build_desktop.ps1).

[platformio]
default_envs = esp32c3
; esp32/main is the IDF 'main' component; core/ is pulled in via components/microreader_core/
src_dir = esp32/main

[env:esp32c3]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = espidf

; --- Flash / upload ---
board_build.partitions    = esp32/default_16MB.csv
board_build.flash_size    = 16MB
board_build.flash_mode    = dio
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000
upload_speed              = 921600
upload_port               = COM4

; --- Serial monitor ---
monitor_speed = 115200
monitor_port  = COM4

; --- Compiler flags ---
; core/include is also exported by the microreader_core component, but listing it
; here ensures it is visible to the auto-generated main component as well.
build_flags =
    -I${PROJECT_DIR}/core/include
